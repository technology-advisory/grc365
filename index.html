<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRC365</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

.hero {
    height: 100vh;
    background: url('hero.png') center/cover no-repeat;
    display: flex;
    align-items: center;
    padding-left: 8%;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(to right, rgba(11,15,26,0.95), rgba(11,15,26,0.2));
}

.content {
    max-width: 600px;
    z-index: 2;
}

h1 {
    font-size: 70px;
    margin: 0;
}

h1 span {
    color: #2ea3ff;
}

h2 {
    margin-top: 10px;
    color: #2ea3ff;
    font-weight: normal;
}

p {
    margin-top: 20px;
    color: #cbd5e1;
    line-height: 1.6;
}
</style>

</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="content">
        <h1>GRC<span>365</span></h1>

        <h2>Seguridad, Riesgo y Cumplimiento — Siempre Activos</h2>

        <p>
        No es una auditoría.<br>
        No es un proyecto.<br>
        Es la capacidad de proteger tu negocio todos los días.
        </p>
    </div>
</div>

</body>
</html>
