<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRCREAL</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Arial;
    background: #f5f7fa;
}
.wrapper {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}
.container {
    max-width: 1200px;
    width: 100%;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}
.container img {
    width: 100%;
    height: auto;
    display: block;
}
.footer {
    padding: 20px 28px;
    border-top: 1px solid #eee;
}
.footer-inner {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
}
.author-block {
    display: flex;
    align-items: center;
    gap: 12px;
}
.author-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0077B5, #00a0dc);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: white;
    flex-shrink: 0;
    letter-spacing: 0.5px;
}
.author-name {
    font-weight: 600;
    font-size: 14px;
    color: #111;
    white-space: nowrap;
}
.author-name span {
    color: #0077B5;
}
.author-title {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
    letter-spacing: 0.2px;
}
.linkedin-link {
    display: flex;
    align-items: center;
    text-decoration: none;
    gap: 10px;
    flex-shrink: 0;
    background: #f0f7fc;
    border: 1px solid #cce4f0;
    border-radius: 8px;
    padding: 8px 14px;
    transition: background 0.2s;
}
.linkedin-link:hover {
    background: #dbeef8;
}
.linkedin-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
}
.text-link {
    font-size: 12px;
    color: #0077B5;
    font-weight: 600;
    display: block;
}
.sub-text {
    font-size: 11px;
    color: #888;
    display: block;
    margin-top: 1px;
}
@media (max-width: 768px) {
    .wrapper {
        padding: 10px;
    }
    .container {
        border-radius: 8px;
    }
    .footer {
        padding: 16px 18px;
    }
    .footer-inner {
        flex-direction: column;
        align-items: flex-start;
    }
    .linkedin-link {
        width: 100%;
        box-sizing: border-box;
    }
}
</style>
</head>
<body>
<div class="wrapper">
    <div class="container">

        <img src="hero.png" alt="GRCREAL">

        <div class="footer">
            <div class="footer-inner">

                <div class="author-block">
                    <div class="author-avatar">MA</div>
                    <div>
                        <div class="author-name">Miguel Ángel Carriazo &middot; <span>vCISO</span></div>
                        <div class="author-title">Cybersecurity &amp; Infrastructure Architect &nbsp;·&nbsp; ISO 27001 &nbsp;·&nbsp; NIS2 &nbsp;·&nbsp; ENS</div>
                    </div>
                </div>

                <a href="https://www.linkedin.com/in/macarriazo/" target="_blank" class="linkedin-link">
                    <svg class="linkedin-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#0077B5">
                        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.761 0 5-2.239 5-5v-14c0-2.761-2.239-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                    </svg>
                    <div>
                        <span class="text-link">"Merece la pena la experiencia..."</span>
                        <span class="sub-text">Hablemos en LinkedIn →</span>
                    </div>
                </a>

            </div>
        </div>

    </div>
</div>
</body>
</html>
