<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRCREAL</title>

<style>

/* BASE */
body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Arial;
    background: #f5f7fa; /* gris muy suave */
}

/* CONTENEDOR GENERAL */
.wrapper {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

/* MARCO BLANCO */
.container {
    max-width: 1200px;
    width: 100%;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* IMAGEN */
.container img {
    width: 100%;
    height: auto;
    display: block;
}

/* MOBILE */
@media (max-width: 768px) {
    .wrapper {
        padding: 10px;
    }

    .container {
        border-radius: 8px;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <div class="container">
        <img src="hero.png" alt="GRCREAL">
    </div>

</div>

</body>
</html>
