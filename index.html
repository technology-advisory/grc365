<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRC365 | Seguridad, Riesgo y Cumplimiento</title>

    <style>
        /* Reseteo básico */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000; /* Fondo negro como el de la imagen */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor principal */
        .container {
            width: 100%;
            max-width: 1200px; /* Evita que en pantallas 4K se estire demasiado y pierda calidad */
            display: flex;
            justify-content: center;
        }

        /* Imagen fluida */
        img {
            width: 100%;       /* Ocupa todo el ancho disponible */
            height: auto;      /* Mantiene la proporción original */
            display: block;    /* Elimina espacios fantasma debajo de la imagen */
        }

        /* Optimización para móviles (pantallas pequeñas) */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="hero.jpg" alt="GRC365 Infografía">
    </div>

</body>
</html>
