<script>

function generatePDF(jsPDF) {
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const items = document.querySelectorAll('.checklist-item');
  const checked = document.querySelectorAll('.checklist-item.checked');
  const total = items.length;
  const done = checked.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const today = new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' });

  // ── COLORES ──
  const brand = [0, 119, 181];
  const ink = [26, 26, 26];
  const muted = [102, 102, 102];
  const light = [232, 243, 250];
  const white = [255, 255, 255];

  // ── NUEVO SISTEMA DE NIVELES ──
  let statusColor, statusLabel;

  if (pct >= 80) {
    statusColor = [39, 174, 96];   // VERDE
    statusLabel = 'Nivel Alto';
  } else if (pct >= 60) {
    statusColor = [241, 196, 15];  // AMARILLO
    statusLabel = 'Nivel Medio';
  } else if (pct >= 30) {
    statusColor = [230, 126, 34];  // NARANJA
    statusLabel = 'Nivel Bajo';
  } else {
    statusColor = [231, 76, 60];   // ROJO
    statusLabel = 'Nivel Crítico';
  }

  const W = 210;
  const margin = 16;
  const contentW = W - margin * 2;

  // ── CABECERA ──
  doc.setFillColor(...brand);
  doc.rect(0, 0, W, 42, 'F');

  doc.setTextColor(...white);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.text('GRCreal', margin, 18);

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('grcreal.com — Herramienta de autoevaluación orientativa', margin, 26);

  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('Checklist ISO 27001:2022 — Autoevaluación', margin, 36);

  // ── BLOQUE INFO ──
  let y = 52;
  doc.setFillColor(...light);
  doc.rect(margin, y, contentW, 22, 'F');

  doc.setTextColor(...muted);
  doc.setFontSize(8);
  doc.text('NORMA', margin + 4, y + 7);
  doc.text('FECHA DE EVALUACIÓN', margin + 60, y + 7);
  doc.text('RESULTADO', margin + 130, y + 7);

  doc.setTextColor(...ink);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.text('ISO/IEC 27001:2022', margin + 4, y + 15);
  doc.text(today, margin + 60, y + 15);

  // ── 🔥 BADGE RESULTADO CORREGIDO ──
  doc.setFillColor(...statusColor);
  doc.rect(margin + 128, y + 8, 54, 11, 'F'); // RECTANGULAR (NO roundedRect)

  doc.setTextColor(...white);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text(statusLabel, margin + 130, y + 15);

  // ── PROGRESO ──
  y += 30;
  doc.setTextColor(...ink);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.text(`${done} de ${total} controles completados (${pct}%)`, margin, y);

  y += 5;
  doc.setFillColor(220, 220, 220);
  doc.rect(margin, y, contentW, 5, 'F');

  if (pct > 0) {
    doc.setFillColor(...statusColor);
    doc.rect(margin, y, (contentW * pct) / 100, 5, 'F');
  }

  // ── NOTA ──
  y += 9;
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'italic');
  doc.setTextColor(130, 130, 130);
  doc.text('Esta autoevaluación es orientativa. Los resultados reflejan los controles marcados como implementados por el evaluador.', margin, y);

  // ── TABLA ──
  y += 12;
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...white);
  doc.setFillColor(...brand);
  doc.rect(margin, y, contentW, 7, 'F');

  doc.text('CÓDIGO', margin + 2, y + 5);
  doc.text('CONTROL', margin + 22, y + 5);
  doc.text('ESTADO', margin + contentW - 22, y + 5);

  y += 9;
  doc.setFont('helvetica', 'normal');

  let rowAlt = false;

  items.forEach(item => {
    const code = item.querySelector('.checklist-code')?.textContent?.trim() || '';
    const text = item.querySelector('.checklist-text')?.textContent?.trim() || '';
    const isChecked = item.classList.contains('checked');

    const lines = doc.splitTextToSize(text, contentW - 40);
    const rowH = Math.max(8, lines.length * 4.5 + 3);

    if (y + rowH > 275) {
      doc.addPage();
      y = 20;
    }

    if (rowAlt) {
      doc.setFillColor(248, 249, 250);
      doc.rect(margin, y, contentW, rowH, 'F');
    }

    doc.setTextColor(...brand);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.text(code, margin + 2, y + 5);

    doc.setTextColor(...ink);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text(lines, margin + 22, y + 5);

    if (isChecked) {
      doc.setFillColor(39, 174, 96);
      doc.rect(margin + contentW - 22, y + 1.5, 18, 5, 'F');

      doc.setTextColor(...white);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'bold');
      doc.text('OK', margin + contentW - 18, y + 5.2);
    } else {
      doc.setFillColor(240, 240, 240);
      doc.rect(margin + contentW - 22, y + 1.5, 18, 5, 'F');

      doc.setTextColor(...muted);
      doc.setFontSize(7);
      doc.text('Pendiente', margin + contentW - 21, y + 5.2);
    }

    doc.setDrawColor(230, 230, 230);
    doc.line(margin, y + rowH, margin + contentW, y + rowH);

    y += rowH;
    rowAlt = !rowAlt;
  });

  // ── FOOTER ──
  const pages = doc.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);

    doc.setFillColor(...brand);
    doc.rect(0, 287, W, 10, 'F');

    doc.setTextColor(...white);
    doc.setFontSize(7);
    doc.text('GRCreal · grcreal.com · Miguel Ángel Carriazo vCISO', margin, 293.5);
    doc.text(`Página ${i} de ${pages}`, W - margin - 16, 293.5);
  }

  const fileName = `GRCreal_ISO27001_${today.replace(/ /g, '_')}.pdf`;
  doc.save(fileName);
}

</script>
