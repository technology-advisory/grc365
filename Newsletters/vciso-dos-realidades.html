<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRCREAL</title>

<style>

/* BASE */
body {
  margin: 0;
  background: #f5f7fa;
  font-family: -apple-system, Segoe UI, Roboto, Arial;
}

/* HERO */
.hero-wrapper {
  display: flex;
  justify-content: center;
  padding: 40px 20px 10px;
}

.hero-container {
  max-width: 1200px;
  width: 100%;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  overflow: hidden;
}

.hero-container img {
  width: 100%;
  display: block;
}

/* NEWSLETTER WRAPPER */
.news-wrapper {
  padding: 20px;
}

/* ---------- TU CSS ORIGINAL (ajustado) ---------- */

.card {
  max-width: 900px;
  margin: 0 auto;
  background: #ffffff;
  border: 1px solid #dedad4;
}

.accent-bar {
  height: 4px;
  background: #cc2800;
}

/* HEADER */
.header {
  padding: 48px 48px 36px;
  border-bottom: 2px solid #cc2800;
  background: #faf8f5;
}

.tag {
  display: inline-block;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.2em;
  color: #cc2800;
  text-transform: uppercase;
  border: 1px solid #cc2800;
  padding: 5px 14px;
  margin-bottom: 26px;
}

.headline {
  font-size: 56px;
  font-weight: bold;
  line-height: 1.05;
}

.headline .accent { color: #cc2800; }
.headline .dim { color: #ccc; }

.subline {
  margin-top: 22px;
  font-size: 18px;
  color: #777;
}

/* BODY */
.body {
  padding: 40px 48px;
}

/* CTA */
.cta-block {
  border: 2px solid #cc2800;
  padding: 36px;
  margin-top: 36px;
  background: #fff9f7;
  text-align: center;
}

.cta-headline {
  font-size: 32px;
  font-weight: bold;
}

.cta-pill {
  display: inline-block;
  background: #cc2800;
  color: white;
  padding: 12px 28px;
  margin-top: 20px;
}

/* FOOTER */
.footer {
  padding: 26px 48px;
  border-top: 1px solid #dedad4;
  background: #faf8f5;
}

.footer-table {
  width: 100%;
}

.author-name {
  font-size: 15px;
  font-weight: bold;
}

.author-title {
  font-size: 12px;
  color: #999;
}

.linkedin-link {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.linkedin-icon {
  width: 28px;
}

.text-link {
  font-size: 13px;
}

.sub-text {
  font-size: 10px;
  color: #0077b5;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  .header, .body {
    padding: 30px 20px;
  }

  .headline {
    font-size: 38px;
  }

  .hero-wrapper {
    padding: 10px;
  }

}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero-wrapper">
  <div class="hero-container">
    <img src="hero.png" alt="GRCREAL">
  </div>
</div>

<!-- NEWSLETTER -->
<div class="news-wrapper">

<div class="card">
  <div class="accent-bar"></div>

  <div class="header">
    <div class="tag">vCISO · Dos realidades</div>

    <div class="headline">
      Hay empresas que <span class="accent">no ven</span> el riesgo.
    </div>

    <p class="subline">
      El vCISO no es solo para quien no tiene seguridad.
    </p>
  </div>

  <div class="body">

    <div class="cta-block">
      <div class="cta-headline">
        ¿En cuál de los dos casos estás?
      </div>
      <div class="cta-pill">Hablemos →</div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <table class="footer-table">
      <tr>
        <td style="width:55%">
          <div class="author-name">Miguel Ángel Carriazo · vCISO</div>
          <div class="author-title">ISO 27001 · NIS2 · ENS</div>
        </td>
        <td style="width:45%">
          <a href="https://www.linkedin.com/in/macarriazo/" target="_blank" class="linkedin-link">
            <svg class="linkedin-icon" viewBox="0 0 24 24" fill="#0077B5">
              <path d="M19 0h-14c-2.7 0-5 2.2-5 5v14c0 2.7 2.2 5 5 5h14c2.7 0 5-2.2 5-5v-14c0-2.7-2.2-5-5-5z"/>
            </svg>
            <div>
              <div class="text-link">"Merece la pena la experiencia..."</div>
              <div class="sub-text">LinkedIn →</div>
            </div>
          </a>
        </td>
      </tr>
    </table>
  </div>

</div>

</div>

</body>
</html>
