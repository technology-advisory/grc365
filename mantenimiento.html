<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GRCreal · En mantenimiento</title>
<meta content="noindex, nofollow" name="robots"/>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    background: #f7f9fb;
    color: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    max-width: 760px;
    width: 100%;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    padding: 42px 34px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
  }

  .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 62px;
    height: 62px;
    border-radius: 16px;
    background: #0077B5;
    color: #ffffff;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 26px;
  }

  .visual {
    margin: 10px auto 30px;
    max-width: 360px;
  }

  h1 {
    font-size: clamp(32px, 6vw, 54px);
    line-height: 1.02;
    margin: 0 0 18px;
    letter-spacing: -0.04em;
  }

  h1 span {
    color: #0077B5;
  }

  p {
    font-size: 18px;
    line-height: 1.6;
    color: #4b5563;
    margin: 0 auto;
    max-width: 560px;
  }

  .note {
    margin-top: 30px;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #6b7280;
  }

  .bar {
    width: 72px;
    height: 4px;
    background: #0077B5;
    border-radius: 99px;
    margin: 28px auto 0;
  }
</style>
<link href="/css/layout-fixes.css" rel="stylesheet"/><link href="/css/typography-system.css" rel="stylesheet"/></head>
<body>
<main class="card">
<div class="logo">MA</div>
<div class="visual">
<svg aria-label="Web en mantenimiento" role="img" viewbox="0 0 420 240" xmlns="http://www.w3.org/2000/svg">
<rect fill="#ffffff" height="170" rx="18" stroke="#d1d5db" stroke-width="4" width="340" x="40" y="45"></rect>
<rect fill="#0077B5" height="36" rx="18" width="340" x="40" y="45"></rect>
<circle cx="65" cy="63" fill="#ffffff" r="5"></circle>
<circle cx="84" cy="63" fill="#ffffff" r="5"></circle>
<circle cx="103" cy="63" fill="#ffffff" r="5"></circle>
<rect fill="#dbeafe" height="14" rx="7" width="260" x="80" y="112"></rect>
<rect fill="#e5e7eb" height="14" rx="7" width="190" x="80" y="142"></rect>
<rect fill="#e5e7eb" height="14" rx="7" width="230" x="80" y="172"></rect>
<path d="M210 20 L235 65 L185 65 Z" fill="#0077B5" opacity="0.18"></path>
<circle cx="325" cy="112" fill="#0077B5" opacity="0.12" r="34"></circle>
<path d="M310 112 h30 M325 97 v30" stroke="#0077B5" stroke-linecap="round" stroke-width="8"></path>
</svg>
</div>
<h1>
      Estoy haciendo<br/>
<span>modificaciones</span>
</h1>
<p>
      Estoy ajustando algunos contenidos de GRCreal para dejar la web más limpia, coherente y alineada con su enfoque actual.
      <br/><br/>
      Pronto vuelvo.
    </p>
<div class="bar"></div>
<div class="note">GRCreal · Seguridad, Riesgo y Cumplimiento</div>
</main>
</body>
</html>
